<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batman Handheld Skin</title>

<style>
    body {
        background: #d0d0d0;
        display: flex;
        justify-content: center;
        padding: 40px;
        font-family: Arial, sans-serif;
    }

    /* Outer handheld frame */
    .handheld {
        width: 420px;
        height: 600px;
        background-image: url('batman.png'); /* <-- replace with your file */
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        position: relative;
    }

    /* LCD window area */
    .lcd-window {
        position: absolute;

        /* These values match the Batman handheld proportions */
        top: 165px;
        left: 70px;
        width: 280px;
        height: 180px;

        background: #b6d39c;
        border: 3px solid #222;
        border-radius: 4px;
        overflow: hidden;

        box-shadow:
            inset 0 0 10px rgba(0,0,0,0.4),
            inset 0 0 3px rgba(255,255,255,0.3);
    }

    /* LCD pixel grid */
    .lcd-window::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
        background-size: 6px 6px;
        pointer-events: none;
    }

    /* Calculator content inside LCD */
    .content {
        padding: 10px;
        font-family: "Courier New", monospace;
        color: #1a2f0f;
        font-weight: bold;
        text-align: center;
    }

    input {
        width: 90%;
        padding: 8px;
        margin-top: 8px;
        border-radius: 4px;
        border: 1px solid #555;
    }

    button {
        width: 90%;
        padding: 10px;
        margin-top: 12px;
        background: #444;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="handheld">

    <div class="lcd-window">
        <div class="content">
            <div id="result">Weight Loss % Calculator</div>

            <input id="start" type="number" placeholder="Starting Weight">
            <input id="current" type="number" placeholder="Current Weight">

            <button onclick="calculate()">Calculate</button>
        </div>
    </div>

</div>

<script>
function calculate() {
    const start = parseFloat(document.getElementById('start').value);
    const current = parseFloat(document.getElementById('current').value);

    if (isNaN(start) || isNaN(current) || start <= 0 || current <= 0) {
        document.getElementById('result').innerText = "Enter valid weights";
        return;
    }

    const loss = start - current;
    const percent = (loss / start) * 100;

    document.getElementById('result').innerText =
        `Loss: ${loss.toFixed(1)} lbs (${percent.toFixed(2)}%)`;
}
</script>

</body>
</html>
