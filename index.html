<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Calc</title>

<!-- iOS Home Screen Icon -->
<link rel="apple-touch-icon" href="calc-icon.png">
<!-- Standard Favicon -->
<link rel="icon" type="image/png" href="calc-icon.png">
<!-- Android / PWA Icon -->
<link rel="manifest" href="/calc/manifest.json">


<style>
  body {
    background: white;
    display: flex;
    justify-content: center;
    padding: 0;
    margin: 0;
    font-family: Arial, sans-serif;
}

/* MOBILE-FIRST BASE */
.handheld {
    width: 100vw;
    height: 100vh;
    background-image: url('images/batman.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: 120em;
    /*background-size: cover; /* crop allowed */
    position: relative;
}

/* LCD takes up 75% of screen width */
.lcd-window {
    width: 75vw;
    height: calc(75vw * (300 / 280)); /* keep original aspect ratio */
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* center on screen */

    background: #b6d39c;
    border: 3px solid #222;
    border-radius: 4px;
    overflow: hidden;

    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.4),
        inset 0 0 3px rgba(255,255,255,0.3);
}

/* LCD pixel grid */
.lcd-window::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
}

.content {
    padding: 10px;
    font-family: "Courier New", monospace;
    color: #1a2f0f;
    font-weight: bold;
    text-align: center;
}

#resultBubble {
    margin: 8px auto;
    padding: 3vw 4vw;
    background: rgba(255,255,255,0.4);
    border-radius: 6px;
    display: inline-block;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-size: 5vw;
}

#resultBubble:hover {
    background: rgba(255,255,255,0.6);
    transform: scale(1.05);
}

#copyHint,
#copiedMsg {
    font-size: 3.5vw;
    margin-top: 4px;
    color: #0a3f0a;
}

#copiedMsg {
    display: none;
}

input,
button {
    width: 90%;
    padding: 3vw;
    margin-top: 3vw;
    border-radius: 6px;
    border: 1px solid #555;
    font-size: 4.5vw;
}

button {
    background: #444;
    color: white;
    cursor: pointer;
}

/* ----------------------------- */
/* DESKTOP MODE (restore original) */
/* ----------------------------- */

@media (max-width: 768px) {

    .lcd-window {
        width: 90vw !important;
        height: 90vh !important;

        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
    }
}


</style>
</head>
<body>

<div class="handheld">
    <div class="lcd-window">
        <div class="content">

            <div id="resultBubble" onclick="copyPercent()">Weight Loss % Calculator</div>
            <div id="copyHint">Click to copy weight loss %</div>
            <div id="copiedMsg">Copied!</div>

            <input id="start" type="number" placeholder="Starting Weight">
            <input id="current" type="number" placeholder="Current Weight">

            <button onclick="calculate()">Calculate</button>
        </div>
    </div>
</div>

<script>
function calculate() {
    const start = parseFloat(document.getElementById('start').value);
    const current = parseFloat(document.getElementById('current').value);

    if (isNaN(start) || isNaN(current) || start <= 0 || current <= 0) {
        document.getElementById('resultBubble').innerText = "Enter valid weights";
        return;
    }

    const loss = start - current;
    const percent = (loss / start) * 100;

    document.getElementById('resultBubble').innerText =
        `Loss: ${loss.toFixed(1)} lbs (${percent.toFixed(2)}%)`;

    document.getElementById('copiedMsg').style.display = "none";
}

function copyPercent() {
    const text = document.getElementById('resultBubble').innerText;

    // Extract the percent inside parentheses
    const match = text.match(/\((.*?)\)/);
    if (!match) return;

    // Convert to one decimal place and ensure % sign
    let percentOnly = match[1];
    let numeric = parseFloat(percentOnly);

    if (isNaN(numeric)) return;

    const formatted = numeric.toFixed(2) + "%";

    navigator.clipboard.writeText(formatted);

    const msg = document.getElementById('copiedMsg');
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 1200);
}

</script>

<script>
  const bgImages = [
    'batman.png',
    'mermaid.png',
    'sonic.png',
    'xmen.png'
  ];
  
  // pick a random image from /images folder
  const randomImage = bgImages[Math.floor(Math.random() * bgImages.length)];
  document.querySelector('.handheld').style.backgroundImage = `url('images/${randomImage}')`;
</script>


</body>
</html>
