<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Retro Handheld Weight Loss Calculator</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #d0d0d0;
        padding: 30px;
        display: flex;
        justify-content: center;
    }

    /* MAIN DEVICE FRAME */
    .device {
        width: 380px;
        padding: 20px;
        border-radius: 18px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
        transition: all 0.3s ease;
        border: 8px solid #333;
    }

    /* LCD SCREEN */
    .lcd {
        background: linear-gradient(#b6d39c, #9bbf7a);
        border: 4px solid #222;
        border-radius: 6px;
        padding: 15px;
        margin-bottom: 20px;
        box-shadow:
            inset 0 0 10px rgba(0,0,0,0.4),
            inset 0 0 3px rgba(255,255,255,0.3);
        position: relative;
    }

    /* LCD pixel grid overlay */
    .lcd::after {
        content: "";
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-image:
            linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
        background-size: 6px 6px;
        pointer-events: none;
    }

    /* LCD text */
    .lcd-content {
        font-family: "Courier New", monospace;
        font-size: 18px;
        text-align: center;
        color: #1a2f0f;
        font-weight: bold;
    }

    /* INPUTS */
    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #555;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #444;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    /* ----------------------------- */
    /* HANDHELD SKINS (based on image) */
    /* ----------------------------- */

    /* Sonic 3 */
    .skin-sonic {
        background: #1e90ff;
        border-color: #ffd200;
        color: #ffd200;
    }

    /* Batman */
    .skin-batman {
        background: #111;
        border-color: #fdd835;
        color: #fdd835;
    }

    /* Street Fighter II */
    .skin-sf2 {
        background: #b00000;
        border-color: #ffe600;
        color: #ffe600;
    }

    /* Mortal Kombat */
    .skin-mk {
        background: #300000;
        border-color: #ff0000;
        color: #ffcc00;
    }

    /* GI Joe */
    .skin-gijoe {
        background: #003366;
        border-color: #cc0000;
        color: #cc0000;
    }

    /* Paperboy */
    .skin-paperboy {
        background: #2b4b8b;
        border-color: #ffffff;
        color: #ffffff;
    }

    /* X-Men */
    .skin-xmen {
        background: #001a4d;
        border-color: #ffcc00;
        color: #ffcc00;
    }

    /* Double Dragon */
    .skin-dd {
        background: #004d00;
        border-color: #ffcc00;
        color: #ffcc00;
    }

    /* Aladdin */
    .skin-aladdin {
        background: #8b008b;
        border-color: gold;
        color: gold;
    }

    /* Home Alone 2 */
    .skin-homealone {
        background: #003366;
        border-color: #ffffff;
        color: #ffffff;
    }

    /* Beauty & the Beast */
    .skin-bb {
        background: #663399;
        border-color: #ffcc00;
        color: #ffcc00;
    }

    /* Little Mermaid */
    .skin-mermaid {
        background: #0099cc;
        border-color: #ff66cc;
        color: #ff66cc;
    }

    /* Spaceballs */
    .skin-spaceballs {
        background: #222;
        border-color: #ffffff;
        color: #ffffff;
    }

    /* Conan */
    .skin-conan {
        background: #4b2e00;
        border-color: #d4a017;
        color: #d4a017;
    }

    /* College Football */
    .skin-football {
        background: #004400;
        border-color: #ffffff;
        color: #ffffff;
    }

</style>
</head>
<body>

<div id="device" class="device skin-sonic">

    <div class="lcd">
        <div id="lcdText" class="lcd-content">Weight Loss % Calculator</div>
    </div>

    <label>Theme</label>
    <select id="themeSelector" onchange="changeTheme()">
        <option value="skin-sonic">Sonic 3</option>
        <option value="skin-batman">Batman</option>
        <option value="skin-sf2">Street Fighter II</option>
        <option value="skin-mk">Mortal Kombat</option>
        <option value="skin-gijoe">GI Joe</option>
        <option value="skin-paperboy">Paperboy</option>
        <option value="skin-xmen">X‑Men</option>
        <option value="skin-dd">Double Dragon</option>
        <option value="skin-aladdin">Aladdin</option>
        <option value="skin-homealone">Home Alone 2</option>
        <option value="skin-bb">Beauty & the Beast</option>
        <option value="skin-mermaid">Little Mermaid</option>
        <option value="skin-spaceballs">Spaceballs</option>
        <option value="skin-conan">Conan</option>
        <option value="skin-football">College Football</option>
    </select>

    <label>Starting Weight</label>
    <input id="start" type="number">

    <label>Current Weight</label>
    <input id="current" type="number">

    <button onclick="calculate()">Calculate</button>

</div>

<script>
function changeTheme() {
    const theme = document.getElementById("themeSelector").value;
    const device = document.getElementById("device");
    device.className = "device " + theme;
}

function calculate() {
    const start = parseFloat(document.getElementById('start').value);
    const current = parseFloat(document.getElementById('current').value);

    if (isNaN(start) || isNaN(current) || start <= 0 || current <= 0) {
        document.getElementById('lcdText').innerText = "Enter valid weights";
        return;
    }

    const loss = start - current;
    const percent = (loss / start) * 100;

    document.getElementById('lcdText').innerText =
        `Loss: ${loss.toFixed(1)} lbs (${percent.toFixed(2)}%)`;
}
</script>

</body>
</html>
