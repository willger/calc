<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weight Loss Percentage Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background: #f7f7f7;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #005fcc;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Weight Loss Percentage</h2>

    <label for="start">Starting Weight (lbs)</label>
    <input type="number" id="start" placeholder="Enter starting weight">

    <label for="current">Current Weight (lbs)</label>
    <input type="number" id="current" placeholder="Enter current weight">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <script>
        function calculate() {
            const start = parseFloat(document.getElementById('start').value);
            const current = parseFloat(document.getElementById('current').value);

            if (isNaN(start) || isNaN(current) || start <= 0 || current <= 0) {
                document.getElementById('result').innerText = "Please enter valid weights.";
                return;
            }

            const loss = start - current;
            const percent = (loss / start) * 100;

            document.getElementById('result').innerText =
                `Weight Loss: ${loss.toFixed(1)} lbs (${percent.toFixed(2)}%)`;
        }
    </script>

</body>
</html>
