<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weight Loss Calculator - Skinned</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #e6e6e6;
        padding: 20px;
        display: flex;
        justify-content: center;
    }

    .container {
        width: 360px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        transition: all 0.3s ease;
    }

    /* Default Skin */
    .skin-default {
        background: #ffffff;
        border: 4px solid #333;
    }

    /* Sonic Skin */
    .skin-sonic {
        background: linear-gradient(#1e90ff, #003f91);
        border: 6px solid #ffd200;
        color: white;
    }

    /* Batman Skin */
    .skin-batman {
        background: #111;
        border: 6px solid #fdd835;
        color: #fdd835;
    }

    /* Street Fighter Skin */
    .skin-sf {
        background: linear-gradient(#ff3b3b, #8b0000);
        border: 6px solid #ffe600;
        color: #ffe600;
    }

    /* GI Joe Skin */
    .skin-gijoe {
        background: linear-gradient(#003366, #001a33);
        border: 6px solid #cc0000;
        color: #cc0000;
    }

    h2 {
        text-align: center;
        margin-bottom: 10px;
    }

    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #0078ff;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    #result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
    }

    select {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
    }
</style>
</head>
<body>

<div id="app" class="container skin-default">

    <h2>Weight Loss % Calculator</h2>

    <label>Theme</label>
    <select id="themeSelector" onchange="changeTheme()">
        <option value="skin-default">Default</option>
        <option value="skin-sonic">Sonic</option>
        <option value="skin-batman">Batman</option>
        <option value="skin-sf">Street Fighter</option>
        <option value="skin-gijoe">G.I. Joe</option>
    </select>

    <label for="start">Starting Weight (lbs)</label>
    <input type="number" id="start">

    <label for="current">Current Weight (lbs)</label>
    <input type="number" id="current">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>
</div>

<script>
function changeTheme() {
    const theme = document.getElementById("themeSelector").value;
    const app = document.getElementById("app");

    app.className = "container " + theme;
}

function calculate() {
    const start = parseFloat(document.getElementById('start').value);
    const current = parseFloat(document.getElementById('current').value);

    if (isNaN(start) || isNaN(current) || start <= 0 || current <= 0) {
        document.getElementById('result').innerText = "Please enter valid weights.";
        return;
    }

    const loss = start - current;
    const percent = (loss / start) * 100;

    document.getElementById('result').innerText =
        `Weight Loss: ${loss.toFixed(1)} lbs (${percent.toFixed(2)}%)`;
}
</script>

</body>
</html>
