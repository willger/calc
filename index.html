<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batman Handheld Skin</title>

<style>
   body {
    background: #d0d0d0;
    display: flex;
    justify-content: center;
    padding: 40px;
    font-family: Arial, sans-serif;
}

/* Outer handheld frame */
.handheld {
    width: 692px;
    height: 600px;
    background-image: url('images/batman.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: contain;
    position: relative;
}
   
#copyHint {
    font-size: 14px;
    margin-top: 4px;
    color: #0a3f0a;
    opacity: 0.8;
}
/* LCD window area */
.lcd-window {
    position: absolute;
    top: 159px;
    left: 201px;
    width: 280px;
    height: 276px;

    background: #b6d39c;
    border: 3px solid #222;
    border-radius: 4px;
    overflow: hidden;

    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.4),
        inset 0 0 3px rgba(255,255,255,0.3);
}

/* LCD pixel grid */
.lcd-window::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
}

.content {
    padding: 10px;
    font-family: "Courier New", monospace;
    color: #1a2f0f;
    font-weight: bold;
    text-align: center;
}

/* CLICKABLE RESULT */
#resultBubble {
    margin: 8px auto;
    padding: 10px 14px;
    background: rgba(255,255,255,0.4);
    border-radius: 6px;
    display: inline-block;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    font-size: 18px;
}

#resultBubble:hover {
    background: rgba(255,255,255,0.6);
    transform: scale(1.05);
}

#copiedMsg {
    font-size: 14px;
    margin-top: 4px;
    color: #0a3f0a;
    display: none;
}

input {
    width: 90%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #555;
    font-size: 18px;
}

button {
    width: 90%;
    padding: 14px;
    margin-top: 14px;
    background: #444;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
}

/* ----------------------------- */
/* MOBILE RESPONSIVE MODE        */
/* ----------------------------- */

@media (max-width: 768px) {

    body {
        padding: 10px;
    }

    .handheld {
        width: 100vw;
        height: calc(100vw * 0.85); /* maintain aspect ratio */
    }

    .lcd-window {
        /* scale LCD window proportionally */
        top: calc(159px * (100vw / 692));
        left: calc(201px * (100vw / 692));
        width: calc(280px * (100vw / 692));
        height: calc(180px * (100vw / 692));
    }

    #resultBubble {
        font-size: calc(18px * (100vw / 692));
        padding: calc(10px * (100vw / 692));
    }

    input {
        font-size: calc(18px * (100vw / 692));
        padding: calc(14px * (100vw / 692));
    }

    button {
        font-size: calc(18px * (100vw / 692));
        padding: calc(14px * (100vw / 692));
    }
}

</style>
</head>
<body>

<div class="handheld">

    <div class="lcd-window">
        <div class="content">

            <div id="resultBubble" onclick="copyPercent()">Weight Loss % Calculator</div>
            <div id="copyHint">Click to copy weight loss %</div>
            <div id="copiedMsg">Copied!</div>

            <input id="start" type="number" placeholder="Starting Weight">
            <input id="current" type="number" placeholder="Current Weight">

            <button onclick="calculate()">Calculate</button>
        </div>
    </div>

</div>

<script>
function calculate() {
    const start = parseFloat(document.getElementById('start').value);
    const current = parseFloat(document.getElementById('current').value);

    if (isNaN(start) || isNaN(current) || start <= 0 || current <= 0) {
        document.getElementById('resultBubble').innerText = "Enter valid weights";
        return;
    }

    const loss = start - current;
    const percent = (loss / start) * 100;

    document.getElementById('resultBubble').innerText =
        `Loss: ${loss.toFixed(1)} lbs (${percent.toFixed(2)}%)`;

    document.getElementById('copiedMsg').style.display = "none";
}

function copyPercent() {
    const text = document.getElementById('resultBubble').innerText;

    // Extract the percent inside parentheses
    const match = text.match(/\((.*?)\)/);
    if (!match) return;

    // Convert to one decimal place and ensure % sign
    let percentOnly = match[1];
    let numeric = parseFloat(percentOnly);

    if (isNaN(numeric)) return;

    const formatted = numeric.toFixed(1) + "%";

    navigator.clipboard.writeText(formatted);

    const msg = document.getElementById('copiedMsg');
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 1200);
}

</script>

</body>
</html>
