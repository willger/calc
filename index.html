<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batman Handheld Skin</title>

<style>
  @media (max-width: 768px) {

    .handheld {
        width: 100vw !important;
        height: 100vh !important;
        background-size: cover !important;
        background-position: center !important;
    }

    .lcd-window {
        width: 75vw !important;
        height: calc(75vw * (300 / 280)) !important;

        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
    }

    #resultBubble {
        font-size: 5vw !important;
        padding: 3vw 4vw !important;
    }

    input,
    button {
        font-size: 4.5vw !important;
        padding: 3vw !important;
    }
}

</style>
</head>
<body>

<div class="handheld">
    <div class="lcd-window">
        <div class="content">

            <div id="resultBubble" onclick="copyPercent()">Weight Loss % Calculator</div>
            <div id="copyHint">Click to copy weight loss %</div>
            <div id="copiedMsg">Copied!</div>

            <input id="start" type="number" placeholder="Starting Weight">
            <input id="current" type="number" placeholder="Current Weight">

            <button onclick="calculate()">Calculate</button>
        </div>
    </div>
</div>

<script>
function calculate() {
    const start = parseFloat(document.getElementById('start').value);
    const current = parseFloat(document.getElementById('current').value);

    if (isNaN(start) || isNaN(current) || start <= 0 || current <= 0) {
        document.getElementById('resultBubble').innerText = "Enter valid weights";
        return;
    }

    const loss = start - current;
    const percent = (loss / start) * 100;

    document.getElementById('resultBubble').innerText =
        `Loss: ${loss.toFixed(1)} lbs (${percent.toFixed(2)}%)`;

    document.getElementById('copiedMsg').style.display = "none";
}

function copyPercent() {
    const text = document.getElementById('resultBubble').innerText;

    // Extract the percent inside parentheses
    const match = text.match(/\((.*?)\)/);
    if (!match) return;

    // Convert to one decimal place and ensure % sign
    let percentOnly = match[1];
    let numeric = parseFloat(percentOnly);

    if (isNaN(numeric)) return;

    const formatted = numeric.toFixed(2) + "%";

    navigator.clipboard.writeText(formatted);

    const msg = document.getElementById('copiedMsg');
    msg.style.display = "block";

    setTimeout(() => {
        msg.style.display = "none";
    }, 1200);
}

</script>

</body>
</html>
